name: Keep Supabase Alive

on:
  schedule:
    - cron: '30 5 * * *' # Run daily at a random-ish time (5:30 AM)
  workflow_dispatch: # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          # We query the Games table (limit 1) just to trigger activity
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/Games?select=Id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
