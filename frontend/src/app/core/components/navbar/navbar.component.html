<nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" routerLink="/">
            <i class="bi bi-dice-5-fill text-warning fs-4"></i>
            <span>Board Game Hub</span>
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler border-0" type="button" (click)="isCollapsed = !isCollapsed">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links & User -->
        <div class="collapse navbar-collapse" [class.show]="!isCollapsed">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link fw-bold text-warning" routerLink="/play" routerLinkActive="active">Play</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/games" routerLinkActive="active">Games</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/social" routerLinkActive="active">Social</a>
                </li>
                <li class="nav-item" *ngIf="(currentUser$ | async)">
                    <a class="nav-link" routerLink="/admin" routerLinkActive="active">Admin</a>
                </li>
            </ul>

            <!-- User Section -->
            <div class="d-flex align-items-center gap-3">
                <ng-container *ngIf="session$ | async as session; else loginTemplate">
                    <app-active-games></app-active-games>

                    <!-- Consolidated Profile Dropdown -->
                    <div class="dropdown">
                        <button
                            class="d-flex align-items-center text-white bg-transparent border-0 p-0 pointer profile-trigger"
                            type="button" id="userMenu" (click)="toggleDropdown($event)" aria-expanded="false">
                            <div class="avatar-container me-2">
                                <img *ngIf="session.avatarUrl; else guestIcon" [src]="session.avatarUrl" alt="Avatar"
                                    class="rounded-circle border border-2 border-warning" width="32" height="32">
                                <ng-template #guestIcon>
                                    <div class="guest-avatar rounded-circle border border-2 border-info d-flex align-items-center justify-content-center bg-dark"
                                        style="width: 32px; height: 32px;">
                                        <i class="bi bi-person-fill text-info small"></i>
                                    </div>
                                </ng-template>
                            </div>
                            <div class="d-flex flex-column align-items-start line-height-1">
                                <span class="fw-semibold small">{{ session.name }}</span>
                                <span *ngIf="session.isGuest" class="badge rounded-pill bg-info text-dark"
                                    style="font-size: 0.6rem;">Guest</span>
                            </div>
                            <i class="bi bi-chevron-down ms-2 small opacity-50"></i>
                        </button>

                        <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary shadow mt-2"
                            [class.show]="isDropdownOpen" aria-labelledby="userMenu">
                            <li class="px-3 py-2 border-bottom border-secondary mb-1">
                                <div class="small text-muted text-uppercase fw-bold" style="font-size: 0.65rem;">Account
                                </div>
                                <div class="text-white fw-bold truncate" style="max-width: 150px;">{{ session.name }}
                                </div>
                            </li>
                            <li><a class="dropdown-item text-white" routerLink="/settings"><i
                                        class="bi bi-gear me-2"></i>Settings</a></li>
                            <li *ngIf="!session.isGuest"><a class="dropdown-item text-white" routerLink="/profile"><i
                                        class="bi bi-person me-2"></i>My Profile</a></li>
                            <li>
                                <hr class="dropdown-divider border-secondary">
                            </li>
                            <li><button class="dropdown-item text-danger" (click)="logout()">
                                    <i class="bi bi-box-arrow-right me-2"></i>{{ session.isGuest ? 'Leave Session' :
                                    'Sign Out' }}
                                </button></li>
                        </ul>
                    </div>
                </ng-container>

                <!-- Login / Register Buttons -->
                <ng-template #loginTemplate>
                    <div class="d-flex gap-2">
                        <a routerLink="/login" class="btn btn-outline-light btn-sm px-3 fw-semibold">Log In</a>
                        <a routerLink="/register" class="btn btn-warning btn-sm px-3 fw-bold text-dark">Sign Up</a>
                    </div>
                </ng-template>
            </div>
        </div>
    </div>
</nav>
