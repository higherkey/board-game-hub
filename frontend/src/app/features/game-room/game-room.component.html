<div class="container-fluid vh-100 d-flex flex-column overflow-hidden">
    <!-- 1. HEADER (Top Bar) -->
    <header class="navbar navbar-dark bg-dark px-3 mt-2 rounded shadow-sm flex-shrink-0">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-light btn-sm" (click)="leaveRoom()">
                <i class="bi bi-box-arrow-left"></i> Leave
            </button>

            <button class="btn btn-warning btn-sm" *ngIf="gameStarted$ | async" (click)="requestUndo()"
                title="Request Undo">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>

            <span class="badge bg-primary fs-6">Room: {{ roomCode }}</span>
            <span class="text-white-50 small ms-2" *ngIf="connectionStatus$ | async as status">
                <i class="bi bi-circle-fill" [class.text-success]="status === 'Connected'"
                    [class.text-danger]="status === 'Disconnected'"></i>
                {{ status }}
            </span>
        </div>
        <div class="text-white" *ngIf="currentRoom$ | async as room">
            <span *ngIf="room.gameType" class="badge bg-info text-dark me-2">{{ room.gameType }}</span>
        </div>
    </header>

    <!-- UNDO TOAST OVERLAY -->
    <app-undo-toast *ngIf="(currentRoom$ | async)?.currentVote" [vote]="(currentRoom$ | async)?.currentVote"
        [currentUserId]="getMyConnectionId((currentRoom$ | async)?.players)"
        [totalPlayers]="(currentRoom$ | async)?.players?.length || 0">
    </app-undo-toast>

    <!-- 2. MAIN BODY (Sidebar + Content) -->
    <!-- 2. MAIN BODY (Sidebar + Content) -->
    <div class="row flex-grow-1 mt-3 g-3 overflow-hidden position-relative">

        <!-- SIDEBAR (Players & Chat) -->
        <!-- Visible on desktop (d-md-flex). On mobile, visible only if mobileView === 'players' -->
        <div class="col-md-3 col-lg-2 d-flex flex-column h-100 sidebar-panel" [class.d-none]="mobileView !== 'players'"
            [class.d-flex]="mobileView === 'players'">

            <!-- Video Chat (Always Visible in this panel) -->
            <div class="video-section mb-3 flex-shrink-0">
                <app-video-chat></app-video-chat>
            </div>

            <!-- Player List -->
            <div class="card bg-surface shadow-sm flex-grow-1 overflow-auto">
                <div class="card-header bg-secondary text-white py-2">
                    <small class="fw-bold">PLAYERS ({{ (players$ | async)?.length || 0 }})</small>
                </div>
                <ul class="list-group list-group-flush small">
                    <li class="list-group-item d-flex justify-content-between align-items-center"
                        *ngFor="let p of players$ | async">
                        <div class="text-truncate" style="max-width: 100px;" title="{{p.name}}">
                            {{ p.name }} <i *ngIf="p.isHost" class="bi bi-star-fill text-warning ms-1"></i>
                        </div>
                        <span class="badge bg-light text-dark border">{{ p.score || 0 }}</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- MAIN STAGE -->
        <!-- Visible on desktop (d-md-flex). On mobile, visible only if mobileView === 'game' -->
        <div class="col-md-9 col-lg-10 h-100 d-flex flex-column overflow-auto main-stage-panel"
            [class.d-none]="mobileView !== 'game'" [class.d-flex]="mobileView === 'game'">

            <div class="main-stage card shadow-sm flex-grow-1 border-0 bg-light">
                <div class="card-body p-4 h-100 d-flex flex-column">

                    <!-- LOBBY STATE -->
                    <div *ngIf="!(gameStarted$ | async)"
                        class="h-100 d-flex flex-column align-items-center justify-content-center">
                        <div class="text-center w-100" style="max-width: 600px;">
                            <h2 class="display-5 mb-4">Waiting for Game</h2>

                            <!-- Host Controls -->
                            <div *ngIf="isHost$ | async; else playerWaiting">
                                <app-host-settings [roomCode]="roomCode"
                                    [currentGameType]="(currentRoom$ | async)?.gameType"
                                    (gameStart)="startGame($event)">
                                </app-host-settings>
                            </div>

                            <ng-template #playerWaiting>
                                <div class="alert alert-info py-4">
                                    <h4 class="alert-heading"><i class="bi bi-hourglass-split"></i> Host is setting up
                                    </h4>
                                    <p class="mb-0">Sit tight! The game will start soon.</p>
                                </div>
                            </ng-template>
                        </div>
                    </div>

                    <!-- ACTIVE GAME STATE -->
                    <div *ngIf="gameStarted$ | async" class="h-100 w-100">

                        <!-- HOST VIEW -->
                        <div *ngIf="isHost$ | async; else playerView" class="h-100">
                            <div [ngSwitch]="(currentRoom$ | async)?.gameType" class="h-100">
                                <!-- JUST ONE -->
                                <!-- ONE & ONLY -->
                                <app-one-and-only-board *ngSwitchCase="'OneAndOnly'" [room]="currentRoom$ | async">
                                </app-one-and-only-board>

                                <!-- BABBLE -->
                                <app-babble *ngSwitchCase="'Babble'" [grid]="(currentRoom$ | async)?.gameState?.grid"
                                    [isPlaying]="(currentRoom$ | async)?.state === 'Playing'"
                                    (wordsUpdated)="onBabbleWordsUpdated($event)">
                                </app-babble>

                                <!-- BREAKING NEWS -->
                                <app-breaking-news *ngSwitchCase="'BreakingNews'" [room]="currentRoom$ | async"
                                    [myConnectionId]="getMyConnectionId((currentRoom$ | async)?.players)">
                                </app-breaking-news>

                                <!-- DEEPFAKE (Disabled) -->
                                <!-- <app-deepfake-game *ngSwitchCase="'Deepfake'" [room]="currentRoom$ | async">
                                </app-deepfake-game> -->

                                <!-- UNIVERSAL TRANSLATOR -->
                                <app-universal-translator *ngSwitchCase="'UniversalTranslator'"
                                    [room]="currentRoom$ | async">
                                </app-universal-translator>

                                <!-- PICTOPHONE -->
                                <app-pictophone-game *ngSwitchCase="'Pictophone'" [room]="(currentRoom$ | async)!"
                                    [myConnectionId]="getMyConnectionId((currentRoom$ | async)?.players)">
                                </app-pictophone-game>

                                <!-- POPPYCOCK -->
                                <app-poppycock-board *ngSwitchCase="'Poppycock'" [room]="currentRoom$ | async">
                                </app-poppycock-board>

                                <!-- SYMBOLOGY -->
                                <app-symbology *ngSwitchCase="'Symbology'" [room]="(currentRoom$ | async)!">
                                </app-symbology>

                                <!-- WISECRACK -->
                                <app-wisecrack-game *ngSwitchCase="'Wisecrack'" [room]="(currentRoom$ | async)!">
                                </app-wisecrack-game>

                                <!-- SUSHI TRAIN -->
                                <app-sushi-train *ngSwitchCase="'SushiTrain'"
                                    [gameState]="(currentRoom$ | async)?.gameData"
                                    [players]="(currentRoom$ | async)?.players || []">
                                </app-sushi-train>

                                <!-- SCATTERBRAIN (Default) -->
                                <div *ngSwitchDefault class="h-100">
                                    <div [ngSwitch]="(currentRoom$ | async)?.state" class="h-100">
                                        <app-game-review *ngSwitchCase="'Finished'" [room]="(currentRoom$ | async)!"
                                            [isHost]="(isHost$ | async)!">
                                        </app-game-review>

                                        <app-game-board *ngSwitchDefault [roomCode]="roomCode"
                                            [isHost]="(isHost$ | async)!">
                                        </app-game-board>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- PLAYER VIEW -->
                        <ng-template #playerView>
                            <div class="h-100 d-flex flex-column justify-content-center">
                                <div [ngSwitch]="(currentRoom$ | async)?.gameType" class="h-100">
                                    <!-- JUST ONE -->
                                    <!-- ONE & ONLY -->
                                    <div *ngSwitchCase="'OneAndOnly'" class="h-100">
                                        <app-one-and-only-player [room]="currentRoom$ | async"
                                            [myConnectionId]="getMyConnectionId((currentRoom$ | async)?.players)"
                                            (clueSubmitted)="onClueSubmitted($event)"
                                            (guessSubmitted)="onGuessSubmitted($event)">
                                        </app-one-and-only-player>
                                    </div>

                                    <!-- BREAKING NEWS -->
                                    <div *ngSwitchCase="'BreakingNews'" class="h-100">
                                        <app-breaking-news [room]="currentRoom$ | async"
                                            [myConnectionId]="getMyConnectionId((currentRoom$ | async)?.players)">
                                        </app-breaking-news>
                                    </div>

                                    <!-- DEEPFAKE -->
                                    <div *ngSwitchCase="'Deepfake'" class="h-100">
                                        <app-deepfake-game [room]="(currentRoom$ | async)!">
                                        </app-deepfake-game>
                                    </div>

                                    <div *ngSwitchCase="'UniversalTranslator'" class="h-100">
                                        <app-universal-translator [room]="currentRoom$ | async">
                                        </app-universal-translator>
                                    </div>

                                    <!-- PICTOPHONE -->
                                    <div *ngSwitchCase="'Pictophone'" class="h-100">
                                        <app-pictophone-game [room]="(currentRoom$ | async)!"
                                            [myConnectionId]="getMyConnectionId((currentRoom$ | async)?.players)">
                                        </app-pictophone-game>
                                    </div>

                                    <!-- POPPYCOCK -->
                                    <div *ngSwitchCase="'Poppycock'" class="h-100">
                                        <app-poppycock-player [room]="currentRoom$ | async"
                                            [myConnectionId]="getMyConnectionId((currentRoom$ | async)?.players)"
                                            (definitionSubmitted)="onPoppycockDefSubmitted($event)"
                                            (voteSubmitted)="onPoppycockVoteSubmitted($event)">
                                        </app-poppycock-player>
                                    </div>

                                    <!-- SYMBOLOGY -->
                                    <div *ngSwitchCase="'Symbology'" class="h-100">
                                        <app-symbology [room]="(currentRoom$ | async)!">
                                        </app-symbology>
                                    </div>

                                    <!-- WISECRACK -->
                                    <div *ngSwitchCase="'Wisecrack'" class="h-100">
                                        <app-wisecrack-game [room]="(currentRoom$ | async)!">
                                        </app-wisecrack-game>
                                    </div>

                                    <!-- SUSHI TRAIN -->
                                    <div *ngSwitchCase="'SushiTrain'" class="h-100">
                                        <app-sushi-train-player [gameState]="(currentRoom$ | async)?.gameData"
                                            [currentUserId]="getMyConnectionId((currentRoom$ | async)?.players)">
                                        </app-sushi-train-player>
                                    </div>

                                    <!-- DEFAULT MOBILE CONTROLLER -->
                                    <app-mobile-controller *ngSwitchDefault
                                        [roomCode]="roomCode"></app-mobile-controller>
                                </div>
                            </div>
                        </ng-template>

                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- 3. MOBILE TAB BAR (Small Screens Only) -->
    <div class="d-md-none mt-auto mobile-tab-bar bg-dark text-white d-flex justify-content-around py-2 flex-shrink-0">
        <button class="btn btn-link text-white text-decoration-none d-flex flex-column align-items-center"
            [class.text-accent]="mobileView === 'game'" (click)="setMobileView('game')">
            <i class="bi bi-controller fs-4"></i>
            <span class="small">Game</span>
        </button>
        <button class="btn btn-link text-white text-decoration-none d-flex flex-column align-items-center"
            [class.text-accent]="mobileView === 'players'" (click)="setMobileView('players')">
            <i class="bi bi-people-fill fs-4"></i>
            <span class="small">Players</span>
        </button>
    </div>
</div>
