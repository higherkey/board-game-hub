<div class="combobox-list" [class.focus]="hasVisualFocus || isOpen">
  <div class="group" [class.disabled]="disabled">
    <input 
      #inputEle
      [id]="idPrefix + '-input'" 
      class="cb_edit" 
      type="text" 
      role="combobox" 
      aria-autocomplete="list" 
      [attr.aria-expanded]="isOpen" 
      [attr.aria-controls]="idPrefix + '-listbox'"
      [placeholder]="placeholder"
      [disabled]="disabled"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      [(ngModel)]="filter"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (click)="open()"
    >
    <button 
      *ngIf="filter || value !== 'None'"
      type="button"
      class="clear-btn"
      aria-label="Clear selection"
      (click)="clearSelection($event)"
      tabindex="-1"
    >
      <i class="bi bi-x"></i>
    </button>
    <button 
      #buttonEle
      type="button" 
      [id]="idPrefix + '-button'" 
      aria-label="Toggle List" 
      [attr.aria-expanded]="isOpen" 
      [attr.aria-controls]="idPrefix + '-listbox'" 
      tabindex="-1"
      [disabled]="disabled"
      (click)="toggle()"
    >
      <svg width="18" height="16" aria-hidden="true" focusable="false">
        <polygon class="arrow" points="3,6 15,6 9,14"></polygon>
      </svg>
    </button>
  </div>
  
  <ul 
    #listboxEle
    [id]="idPrefix + '-listbox'" 
    role="listbox" 
    [class.show]="isOpen"
    [attr.aria-label]="placeholder"
  >
    <li 
      *ngFor="let option of filteredOptions; let i = index" 
      [id]="idPrefix + '-opt-' + i"
      role="option" 
      [attr.aria-selected]="i === activeIndex"
      (click)="selectOption(option)"
      [class.active]="i === activeIndex"
    >
      <span class="option-icon">{{ option.icon }}</span>
      <span class="option-name">{{ option.name }}</span>
    </li>
    <li *ngIf="filteredOptions.length === 0" class="no-results">
        No games found
    </li>
  </ul>
</div>
