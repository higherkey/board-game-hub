<div class="settings-panel" [class.compact-mode]="compactMode">
    <!-- COMPACT MODE: Single Row -->
    <div *ngIf="compactMode" class="compact-row d-flex align-items-center gap-3 flex-wrap">
        <!-- Game Mode Select -->
        <!-- Game Mode Selection (Searchable) -->
        <div class="compact-item flex-grow-1 position-relative" style="min-width: 200px;">
            <div class="input-group input-group-sm shadow-sm">
                <span class="input-group-text bg-surface border-2 border-end-0"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control bg-surface border-2 border-start-0 py-2"
                    placeholder="CHOOSE GAME" [(ngModel)]="gameSearchQuery">
            </div>
            <!-- Dropdown Results -->
            <div *ngIf="gameSearchQuery && filteredGames.length > 0 && selectedGameType === 'None'"
                class="position-absolute w-100 mt-1 shadow-lg rounded-3 bg-white overflow-hidden border border-light"
                style="z-index: 1050; max-height: 250px; overflow-y: auto;" role="listbox">
                <div *ngFor="let game of filteredGames" (click)="changeGameType(game.id)"
                    (keydown.enter)="changeGameType(game.id)" tabindex="0"
                    class="d-flex align-items-center gap-2 p-2 dropdown-item cursor-pointer hover-bg-brand-light"
                    role="option">
                    <span class="fs-5">{{ game.icon }}</span>
                    <span class="fw-bold text-primary">{{ game.name }}</span>
                </div>
            </div>
            <!-- Selected Badge -->
            <div *ngIf="selectedGameType !== 'None'"
                class="position-absolute top-50 end-0 translate-middle-y me-2 d-flex align-items-center gap-1">
                <span
                    class="badge bg-brand-light text-brand-blue border border-brand-blue-subtle d-flex align-items-center gap-1">
                    {{ selectedGame?.icon }} {{ selectedGame?.name }}
                    <i class="bi bi-x-circle cursor-pointer" (click)="selectedGameType = 'None'; gameSearchQuery = ''"
                        (keydown.enter)="selectedGameType = 'None'; gameSearchQuery = ''" tabindex="0" role="button"
                        aria-label="Clear Selection"></i>
                </span>
            </div>
        </div>

        <!-- Timer Setting -->
        <div class="compact-item d-flex align-items-center gap-2">
            <i class="bi bi-clock text-secondary"></i>
            <input type="number" [(ngModel)]="settings.timerDurationSeconds"
                class="form-control form-control-sm text-center" style="width: 60px;" title="Seconds">
        </div>

        <!-- Rounds Setting (Compact) -->
        <div class="compact-item d-flex align-items-center gap-2">
            <i class="bi bi-hash text-secondary"></i>
            <input type="number" [(ngModel)]="settings.totalRounds" min="1" max="50"
                class="form-control form-control-sm text-center" style="width: 60px;" title="Total Rounds">
        </div>

        <!-- Start Button -->
        <div class="compact-item">
            <button type="button" class="btn fw-bold" (click)="startGame()" [disabled]="selectedGameType === 'None'"
                [ngClass]="(isIntermission && currentRound >= (settings.totalRounds || 5)) ? 'btn-danger' : 'btn-primary'"
                style="border: none;"
                [style.background]="(isIntermission && currentRound >= (settings.totalRounds || 5)) ? '' : 'linear-gradient(135deg, var(--secondary) 0%, var(--accent-dark) 100%)'">

                <ng-container *ngIf="!isIntermission; else intermissionBtn">
                    <i class="bi bi-play-fill me-1"></i> START
                </ng-container>
                <ng-template #intermissionBtn>
                    <i class="bi" [class.bi-fast-forward-fill]="currentRound < (settings.totalRounds || 5)"
                        [class.bi-flag-fill]="currentRound >= (settings.totalRounds || 5)"></i>
                    {{ currentRound >= (settings.totalRounds || 5) ? 'FINISH GAME' : 'NEXT ROUND' }}
                </ng-template>
            </button>
        </div>
    </div>

    <!-- COMPACT MODE: Dynamic Game Settings -->
    <div *ngIf="compactMode && selectedGame?.parsedMetadata?.length"
        class="compact-game-settings pt-2 mt-2 border-top border-secondary border-opacity-10 d-flex gap-3 align-items-center flex-wrap">

        <div *ngFor="let meta of selectedGame?.parsedMetadata" class="compact-setting d-flex align-items-center gap-2">
            <i class="bi" [class.bi-gear]="meta.type !== 'select'" [class.bi-list-ul]="meta.type === 'select'"></i>

            <select *ngIf="meta.type === 'select'" class="form-select form-select-sm" [(ngModel)]="settings[meta.id]"
                style="width: auto;">
                <option *ngFor="let opt of meta.options" [ngValue]="opt.value">{{ opt.label }}</option>
            </select>

            <input *ngIf="meta.type === 'number'" type="number" class="form-control form-control-sm text-center"
                [(ngModel)]="settings[meta.id]" style="width: 60px;">

            <div *ngIf="meta.type === 'checkbox'" class="form-check form-switch m-0">
                <input class="form-check-input" type="checkbox" [(ngModel)]="settings[meta.id]">
            </div>
        </div>
    </div>

    <!-- FULL MODE: Large Grid (Original) -->
    <ng-container *ngIf="!compactMode">
        <div class="panel-header">
            <i class="bi bi-gear-fill"></i>
            <h3>Game Settings</h3>
        </div>

        <div class="settings-grid">
            <!-- LEFT COLUMN -->
            <div class="settings-col">
                <!-- Game Mode -->
                <!-- Game Mode Selection (Searchable) -->
                <div class="setting-group">
                    <label for="gameSearchInputFull" class="form-label small text-uppercase fw-bold"
                        style="color: var(--text-secondary);">CHOOSE
                        GAME</label>
                    <div class="position-relative">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-surface border-2 border-end-0"><i
                                    class="bi bi-search"></i></span>
                            <input id="gameSearchInputFull" type="text"
                                class="form-control form-control-lg bg-surface border-2 border-start-0 fw-bold"
                                placeholder="Search for a game..." [(ngModel)]="gameSearchQuery">
                        </div>

                        <!-- Dropdown Results -->
                        <div *ngIf="gameSearchQuery && filteredGames.length > 0"
                            class="position-absolute w-100 mt-2 shadow-lg rounded-3 bg-white overflow-hidden border border-light"
                            style="z-index: 1050; max-height: 300px; overflow-y: auto;" role="listbox">
                            <div *ngFor="let game of filteredGames" (click)="changeGameType(game.id)"
                                (keydown.enter)="changeGameType(game.id)" tabindex="0"
                                class="d-flex align-items-center gap-3 p-3 dropdown-item cursor-pointer border-bottom-light"
                                [class.bg-brand-light]="selectedGameType === game.id" role="option"
                                [attr.aria-selected]="selectedGameType === game.id">
                                <span class="fs-4">{{ game.icon }}</span>
                                <div class="flex-grow-1">
                                    <div class="fw-bold text-primary">{{ game.name }}</div>
                                    <div class="small text-muted">{{ game.description }}</div>
                                </div>
                                <i *ngIf="selectedGameType === game.id"
                                    class="bi bi-check-circle-fill text-brand-blue"></i>
                            </div>
                        </div>

                        <!-- Selected Game Info -->
                        <div *ngIf="selectedGameType !== 'None' && !gameSearchQuery"
                            class="mt-2 p-2 rounded-2 bg-brand-blue-subtle text-brand-blue d-flex align-items-center gap-2">
                            <span class="fs-5">{{ selectedGame?.icon }}</span>
                            <span class="fw-bold">{{ selectedGame?.name }}</span>
                            <button class="btn btn-sm btn-link text-brand-blue ms-auto p-0"
                                (click)="selectedGameType = 'None'; gameSearchQuery = ''">
                                <i class="bi bi-x-circle-fill"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Undo Settings -->
                <div class="setting-group">
                    <div class="group-label">
                        <i class="bi bi-arrow-counterclockwise"></i>
                        Undo Policy (feature is in beta)
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="allowVoting"
                            [(ngModel)]="undoSettings.allowVoting" (change)="saveUndoSettings()">
                        <label class="form-check-label" for="allowVoting">Allow Undo (Voting)</label>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="settings-col">
                <!-- Timer Duration -->
                <div class="setting-group">
                    <label for="timerDuration">
                        <i class="bi bi-clock"></i>
                        Timer Duration (Seconds)
                    </label>

                    <div class="d-flex gap-2 mb-2">
                        <input id="timerDuration" type="number" min="10" max="600" class="form-control"
                            [(ngModel)]="settings.timerDurationSeconds">
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                            (click)="settings.timerDurationSeconds = 30">30s</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                            (click)="settings.timerDurationSeconds = 60">60s</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                            (click)="settings.timerDurationSeconds = 90">90s</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                            (click)="settings.timerDurationSeconds = 120">2m</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                            (click)="settings.timerDurationSeconds = 300">5m</button>
                    </div>
                </div>

                <!-- Rounds Setting (Full) -->
                <div class="setting-group">
                    <label for="totalRounds">
                        <i class="bi bi-hash"></i>
                        Total Rounds
                    </label>
                    <div class="d-flex gap-2">
                        <input id="totalRounds" type="number" min="1" max="50" class="form-control"
                            [(ngModel)]="settings.totalRounds">
                    </div>
                </div>

                <!-- Dynamic Game Settings (Full) -->
                <div *ngIf="selectedGame?.parsedMetadata?.length" class="game-specific-settings fade-in">
                    <div *ngFor="let meta of selectedGame?.parsedMetadata" class="setting-group">
                        <label [for]="'host-' + meta.id">
                            <i class="bi" [class.bi-gear]="meta.type !== 'select'"
                                [class.bi-list-ul]="meta.type === 'select'"></i>
                            {{ meta.label }}
                        </label>

                        <div *ngIf="meta.type === 'select'" class="select-wrapper">
                            <select [id]="'host-' + meta.id" [(ngModel)]="settings[meta.id]">
                                <option *ngFor="let opt of meta.options" [ngValue]="opt.value">{{ opt.label }}</option>
                            </select>
                            <i class="bi bi-chevron-down"></i>
                        </div>

                        <input *ngIf="meta.type === 'number'" [id]="'host-' + meta.id" type="number"
                            class="form-control" [(ngModel)]="settings[meta.id]">

                        <div *ngIf="meta.type === 'checkbox'" class="form-check form-switch mt-2">
                            <input class="form-check-input" type="checkbox" [id]="'host-' + meta.id"
                                [(ngModel)]="settings[meta.id]">
                            <label class="form-check-label" [for]="'host-' + meta.id">Enabled</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Start Button (Full Width footer) -->
        <div class="mt-4 pt-3 border-top position-relative">
            <button type="button" class="btn-start" (click)="startGame()" [disabled]="selectedGameType === 'None'">
                <i class="bi" [class.bi-play-fill]="!isIntermission" [class.bi-fast-forward-fill]="isIntermission"></i>
                {{ isIntermission ? 'START NEXT ROUND' : 'START GAME' }}
            </button>

            <!-- Confirmation Prompt for Not Ready -->
            <div *ngIf="showReadyConfirmation"
                class="ready-confirmation-overlay position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center p-3 rounded-2 shadow"
                style="background: rgba(255,255,255,0.95); z-index: 10;">
                <div class="text-center">
                    <div class="fw-bold text-danger mb-2">Not all players are ready!</div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-secondary flex-grow-1"
                            (click)="showReadyConfirmation = false">NO</button>
                        <button class="btn btn-sm btn-primary flex-grow-1" (click)="startGame(true)">YES, START</button>
                    </div>
                </div>
            </div>
        </div>
    </ng-container>
</div>
