<div class="settings-panel" [class.compact-mode]="compactMode">
    <!-- COMPACT MODE: Single Row (Used in Intermission or mobile host tab) -->
    <div *ngIf="compactMode" class="compact-row d-flex align-items-center gap-3 flex-wrap">
        <!-- Game Selection (Searchable) -->
        <div class="compact-item flex-grow-1 position-relative" style="min-width: 200px;">
            <app-game-combobox
                [(ngModel)]="selectedGameType"
                [options]="availableGames"
                [disabled]="isIntermission"
                [placeholder]="isIntermission ? 'GAME LOCKED' : 'CHOOSE GAME'"
                (selectionChange)="changeGameType($event)"
                idPrefix="compact-game">
            </app-game-combobox>
        </div>

        <!-- Timer Setting -->
        <div class="compact-item d-flex align-items-center gap-2">
            <i class="bi bi-clock text-secondary"></i>
            <input type="number" [(ngModel)]="settings.timerDurationSeconds"
                class="form-control form-control-sm text-center" style="width: 50px;" title="Seconds">
        </div>

        <!-- Rounds Setting (Compact) -->
        <div class="compact-item d-flex align-items-center gap-2">
            <i class="bi bi-hash text-secondary"></i>
            <input type="number" [(ngModel)]="settings.totalRounds" min="1" max="50"
                class="form-control form-control-sm text-center" style="width: 50px;" title="Total Rounds">
        </div>

        <!-- Start Button -->
        <div class="compact-item">
            <button type="button" class="btn fw-bold" (click)="startGame($event)" [disabled]="selectedGameType === 'None'"
                [ngClass]="(isIntermission && currentRound >= (settings.totalRounds || 5)) ? 'btn-danger' : 'btn-primary'"
                style="border: none;"
                [style.background]="(isIntermission && currentRound >= (settings.totalRounds || 5)) ? '' : 'linear-gradient(135deg, var(--secondary) 0%, var(--accent-dark) 100%)'">

                <ng-container *ngIf="!isIntermission; else intermissionBtn">
                    <i class="bi bi-play-fill me-1"></i> START
                </ng-container>
                <ng-template #intermissionBtn>
                    <i class="bi" [class.bi-fast-forward-fill]="currentRound < (settings.totalRounds || 5)"
                        [class.bi-flag-fill]="currentRound >= (settings.totalRounds || 5)"></i>
                    {{ currentRound >= (settings.totalRounds || 5) ? 'FINISH GAME' : 'NEXT ROUND' }}
                </ng-template>
            </button>
        </div>
    </div>

    <!-- FULL MODE: Large 3-Column Grid -->
    <ng-container *ngIf="!compactMode">
        <div class="settings-grid">

            <!-- COLUMN 1: Room Identification -->
            <div class="settings-col room-info-col text-center">
                <div class="group-label justify-content-center mb-3">
                    <i class="bi bi-qr-code"></i> ROOM INFO
                </div>

                <div class="d-flex align-items-center justify-content-center gap-3 mb-3">
                    <div class="qr-box bg-white p-2 rounded shadow-sm flex-shrink-0">
                        <img [src]="getQrCodeUrl()" alt="Room QR Code" style="width: 100px; height: 100px;">
                    </div>
                    <div class="room-code-badge flex-grow-1 h-100 d-flex flex-column justify-content-center">
                        <div class="x-small text-muted text-uppercase fw-bold ls-wide">Room Code</div>
                        <div class="h4 fw-bold text-primary font-monospace mb-0">{{ roomCode }}</div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="button" class="btn btn-lg w-100 py-3 mb-2 fw-bold shadow-sm ready-button"
                        [class.btn-success]="isScreen ? isHostOverride : meReady"
                        [class.btn-outline-primary]="isScreen ? !isHostOverride : !meReady"
                        (click)="onToggleReady()">
                        <i class="bi"
                            [class.bi-check-circle-fill]="isScreen ? isHostOverride : meReady"
                            [class.bi-circle]="isScreen ? !isHostOverride : !meReady"></i>
                        {{ isScreen ? (isHostOverride ? 'ROOM READY!' : 'FORCE ROOM READY') : (meReady ? 'I\'M READY!' : 'SET PERSONAL READY') }}
                    </button>
                </div>
            </div>

            <!-- COLUMN 2: Game Selection & Undo -->
            <div class="settings-col">
                <div class="group-label">
                    <i class="bi bi-controller"></i> GAME SELECTION
                </div>

                <div class="setting-group">
                    <label for="full-game-input" class="x-small text-uppercase fw-bold opacity-75">Search Gallery</label>
                    <app-game-combobox
                        [(ngModel)]="selectedGameType"
                        [options]="availableGames"
                        [disabled]="isIntermission"
                        [placeholder]="isIntermission ? 'GAME LOCKED' : 'Select a game...'"
                        (selectionChange)="changeGameType($event)"
                        idPrefix="full-game">
                    </app-game-combobox>

                    <!-- Selected Game Info Badge -->
                    <div *ngIf="selectedGameType !== 'None'"
                        class="mt-2 p-2 rounded-2 bg-brand-blue-subtle text-brand-blue d-flex align-items-center gap-2 border border-brand-blue border-opacity-10">
                        <span class="fs-5">{{ selectedGame?.icon }}</span>
                        <span class="fw-bold text-truncate">{{ selectedGame?.name }}</span>
                        <button *ngIf="!isIntermission" class="btn btn-sm btn-link text-brand-blue ms-auto p-0"
                            (click)="changeGameType('None'); gameSearchQuery = ''">
                            <i class="bi bi-x-circle-fill"></i>
                        </button>
                    </div>
                </div>

                <!-- Undo Settings -->
                <div class="setting-group pt-2">
                    <div class="group-label x-small">
                        <i class="bi bi-arrow-counterclockwise"></i> Undo Policy
                    </div>
                    <div class="form-check form-switch small">
                        <input class="form-check-input" type="checkbox" id="allowVoting"
                            [(ngModel)]="undoSettings.allowVoting" (change)="saveUndoSettings()">
                        <label class="form-check-label" for="allowVoting">Allow Voting (Beta)</label>
                    </div>
                </div>
            </div>

            <!-- COLUMN 3: Game Parameters -->
            <div class="settings-col">
                <div class="group-label">
                    <i class="bi bi-sliders"></i> PARAMETERS
                </div>

                <div class="d-flex gap-3">
                    <div class="setting-group flex-grow-1">
                        <label for="timerDuration" class="x-small fw-bold text-uppercase d-block mb-1">Timer (Sec)</label>
                        <input id="timerDuration" type="number" min="0" max="600"
                                class="form-control form-control-sm text-center"
                                [(ngModel)]="settings.timerDurationSeconds" style="max-width: 80px;">
                    </div>
                    <div class="setting-group flex-grow-1">
                        <label for="totalRounds" class="x-small fw-bold text-uppercase d-block mb-1">Rounds</label>
                        <input id="totalRounds" type="number" min="1" max="50"
                                class="form-control form-control-sm text-center" [(ngModel)]="settings.totalRounds"
                                style="max-width: 80px;">
                    </div>
                </div>

                <!-- Dynamic Game Settings (Full) -->
                <div *ngIf="selectedGame?.parsedMetadata?.length"
                    class="game-specific-settings fade-in mt-1 border-top pt-2">
                    <div *ngFor="let meta of selectedGame?.parsedMetadata" class="setting-group mb-2">
                        <label [for]="'host-' + meta.id" class="x-small fw-bold text-uppercase">
                            {{ meta.label }}
                        </label>

                            <div *ngIf="meta.type === 'select'" class="select-wrapper">
                                <select [id]="'host-' + meta.id" [(ngModel)]="settings[meta.id]"
                                    class="form-select form-select-sm">
                                    <option *ngFor="let opt of meta.options" [ngValue]="opt.value">{{ opt.label }}
                                    </option>
                                </select>
                            </div>

                            <input *ngIf="meta.type === 'number'" [id]="'host-' + meta.id" type="number"
                                class="form-control form-control-sm" [(ngModel)]="settings[meta.id]">

                            <div *ngIf="meta.type === 'checkbox'" class="form-check form-switch m-0">
                                <input class="form-check-input" type="checkbox" [id]="'host-' + meta.id"
                                    [(ngModel)]="settings[meta.id]">
                            </div>
                    </div>
                </div>

                <!-- Scatterbrain Specific List UI -->
                <div *ngIf="selectedGameType === 'Scatterbrain'" class="game-specific-settings mt-1 border-top pt-2">
                    <div class="setting-group">
                        <span class="x-small fw-bold text-uppercase mb-1 d-block">List Options</span>
                            <div class="btn-group btn-group-xs w-100 shadow-sm rounded-2 overflow-hidden border">
                                <button class="btn p-1 x-small" [class.btn-primary]="listSelectionMode === 'manual'"
                                    [class.btn-light]="listSelectionMode !== 'manual'"
                                    (click)="listSelectionMode = 'manual'; updateListId()">CHOOSE</button>
                                <button class="btn p-1 x-small" [class.btn-primary]="listSelectionMode === 'random'"
                                    [class.btn-light]="listSelectionMode !== 'random'"
                                    (click)="listSelectionMode = 'random'; updateListId()">RANDOM</button>
                                <button class="btn p-1 x-small" [class.btn-primary]="listSelectionMode === 'generative'"
                                    [class.btn-light]="listSelectionMode !== 'generative'"
                                    (click)="listSelectionMode = 'generative'; updateListId()">GEN</button>
                            </div>
                    </div>

                    <!-- Manual List Selection (Host Only for editing, but we might want to show preview to everyone) -->
                    <div *ngIf="listSelectionMode === 'manual'" class="setting-group mt-2 animate-fade-in">
                        <label for="preset-list-select" class="x-small fw-bold text-uppercase d-block mb-1">Select List</label>
                        <div class="d-flex gap-1">
                            <select id="preset-list-select" class="form-select form-select-sm"
                                [(ngModel)]="selectedListId" (change)="updateListId(); previewList(selectedListId)">
                                <option *ngFor="let list of scatterbrainLists" [value]="list.id">List {{ list.id }}
                                </option>
                            </select>
                            <button class="btn btn-sm btn-outline-secondary" (click)="previewList(selectedListId)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <!-- List Preview Area (Visible to everyone if previewedList is set) -->
                        <div *ngIf="previewedList" class="mt-2 p-2 bg-surface-2 border rounded-2 x-small">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="fw-bold text-uppercase">Categories: List {{ previewedList.id }}</span>
                                <button class="btn btn-sm p-0 text-secondary"
                                    (click)="previewedList = null"><i class="bi bi-x"></i></button>
                            </div>
                            <div class="d-flex flex-wrap gap-1 badge-list">
                                <span *ngFor="let cat of previewedList.categories" class="category-pill">{{ cat
                                    }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Generative Seed -->
                    <div *ngIf="listSelectionMode === 'generative'" class="setting-group mt-2 animate-fade-in">
                        <label for="generative-seed-input" class="x-small fw-bold text-uppercase d-block mb-1">Theme / Seed</label>
                        <input id="generative-seed-input" type="text" class="form-control form-control-sm"
                                [(ngModel)]="settings.generativeSeed" placeholder="Theme...">
                    </div>
                </div>
            </div>
        </div>

        <!-- Start Button (Full Width footer) -->
        <div class="mt-4 pt-3 border-top position-relative">
            <button type="button" class="btn-start shadow-pink mb-2" (click)="startGame($event)"
                [disabled]="selectedGameType === 'None'">
                <i class="bi" [class.bi-play-fill]="!isIntermission" [class.bi-fast-forward-fill]="isIntermission"></i>
                {{ isIntermission ? 'START NEXT ROUND' : 'START GAME' }}
            </button>
            <button *ngIf="isIntermission" type="button" class="btn btn-outline-danger w-100 fw-bold py-2"
                (click)="emitExitGame($event)">
                <i class="bi bi-stop-circle-fill me-1"></i> END SESSION
            </button>

        </div>
    </ng-container>
</div>
