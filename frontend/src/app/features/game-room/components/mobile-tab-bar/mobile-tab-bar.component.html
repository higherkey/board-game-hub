<div class="mobile-tab-bar d-md-none fixed-bottom d-flex justify-content-around align-items-center py-2 shadow-lg">
    <!-- Game Tab -->
    <button class="btn btn-link nav-btn d-flex flex-column align-items-center" [class.active]="activeTab === 'game'"
        (click)="selectTab('game')">
        <div class="icon-wrapper mb-1">
            <i class="bi bi-controller fs-4"></i>
        </div>
        <span class="small fw-bold">Game</span>
    </button>

    <!-- Players Tab -->
    <button class="btn btn-link nav-btn d-flex flex-column align-items-center" [class.active]="activeTab === 'players'"
        (click)="selectTab('players')">
        <div class="icon-wrapper mb-1">
            <i class="bi bi-people-fill fs-4"></i>
        </div>
        <span class="small fw-bold">Players</span>
    </button>
