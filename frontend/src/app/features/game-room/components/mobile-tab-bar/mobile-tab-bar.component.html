<div class="mobile-tab-bar d-md-none fixed-bottom d-flex justify-content-around align-items-center shadow-lg">
    <!-- Game Tab -->
    <button class="btn btn-link nav-btn d-flex align-items-center justify-content-center gap-2" [class.active]="activeTab === 'game'"
        (click)="selectTab('game')">
        <i class="bi bi-controller fs-5"></i>
        <span class="fw-bold">Game</span>
    </button>

    <!-- Players Tab -->
    <button class="btn btn-link nav-btn d-flex align-items-center justify-content-center gap-2" [class.active]="activeTab === 'players'"
        (click)="selectTab('players')">
        <i class="bi bi-people-fill fs-5"></i>
        <span class="fw-bold">Players</span>
    </button>
</div>
