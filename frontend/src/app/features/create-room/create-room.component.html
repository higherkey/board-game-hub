<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg bg-surface border-primary">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h2 class="m-0">Create New Room</h2>
                    <p class="mb-0 opacity-75">Start a new game session</p>
                </div>
                <div class="card-body p-4">
                    <form (ngSubmit)="createRoom()">
                        <!-- Nickname Input -->
                        <div class="mb-4">
                            <label for="nickname" class="form-label fw-bold">Your Nickname</label>
                            <input type="text" id="nickname" class="form-control form-control-lg" [(ngModel)]="nickname"
                                name="nickname" placeholder="Enter your name" required autocomplete="off">
                        </div>

                        <!-- Game Type Selection -->
                        <div class="mb-4 position-relative">
                            <label for="gameTypeInput" class="form-label fw-bold">Choose Game (Optional)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-search text-secondary"></i>
                                </span>
                                <input class="form-control form-control-lg border-start-0" id="gameTypeInput"
                                    [(ngModel)]="searchTerm" name="searchTerm" placeholder="Type to search or select..."
                                    (input)="filterGames()" (keydown)="handleKeyDown($event)"
                                    (focus)="showDropdown = true" (blur)="onBlur()" autocomplete="off">
                            </div>

                            <!-- Custom Dropdown Menu -->
                            <div class="dropdown-menu w-100 shadow-sm scrollable-menu"
                                [class.show]="showDropdown && (filteredGames.length > 0 || !searchTerm)"
                                style="max-height: 250px; overflow-y: auto;">
                                <button type="button" class="dropdown-item py-2 px-3 border-bottom"
                                    [class.active]="focusIndex === -1 && showDropdown" (mousedown)="selectGame(null)">
                                    <span class="me-2 text-secondary">❔</span> Decide Later (Lobby)
                                </button>
                                <button type="button"
                                    class="dropdown-item py-2 px-3 border-bottom d-flex align-items-center"
                                    *ngFor="let game of filteredGames; let i = index" [class.active]="focusIndex === i"
                                    (mousedown)="selectGame(game)">
                                    <span class="me-3 display-6 fs-5">{{game.icon}}</span>
                                    <div>
                                        <div class="fw-bold">{{formatGameName(game)}}</div>
                                        <div class="small text-secondary text-truncate" style="max-width: 300px;">
                                            {{game.description}}</div>
                                    </div>
                                </button>
                                <div *ngIf="filteredGames.length === 0 && searchTerm"
                                    class="dropdown-item text-muted disabled">
                                    No games found matching "{{searchTerm}}"
                                </div>
                            </div>
                            <div class="form-text">You can always find more games in the lobby.</div>
                        </div>

                        <!-- Room Options -->
                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="isPublic" [(ngModel)]="isPublic"
                                    name="isPublic">
                                <label class="form-check-label" for="isPublic">Public Room (Visible in Lobby
                                    List)</label>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold"
                                [disabled]="!nickname || creating">
                                <span *ngIf="!creating">Create Room <i class="bi bi-arrow-right-circle ms-2"></i></span>
                                <output *ngIf="creating" class="spinner-border spinner-border-sm"
                                    aria-hidden="true"></output>
                            </button>
                            <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
