<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg bg-surface border-primary">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h2 class="m-0">Create New Room</h2>
                    <p class="mb-0 opacity-75">Start a new game session</p>
                </div>
                <div class="card-body p-4">
                    <form (ngSubmit)="createRoom()">
                        <!-- Nickname Input -->
                        <div class="mb-4">
                            <label for="nickname" class="form-label fw-bold">Your Nickname</label>
                            <input type="text" id="nickname" class="form-control form-control-lg" [(ngModel)]="nickname"
                                name="nickname" placeholder="Enter your name" required autocomplete="off">
                        </div>

                        <!-- Game Type Selection -->
                        <div class="mb-4">
                            <label for="gameType" class="form-label fw-bold">Choose Game (Optional)</label>
                            <select id="gameType" class="form-select form-select-lg" [(ngModel)]="selectedGameType"
                                name="gameType">
                                <option value="None">Decide Later (Lobby)</option>
                                <option value="Scatterbrain">🧠 Scatterbrain</option>
                                <option value="Boggle">🔤 Boggle</option>
                            </select>
                            <div class="form-text">You can always change the game later in the lobby.</div>
                        </div>

                        <!-- Room Options -->
                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="isPublic" [(ngModel)]="isPublic"
                                    name="isPublic">
                                <label class="form-check-label" for="isPublic">Public Room (Visible in Lobby
                                    List)</label>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold"
                                [disabled]="!nickname || creating">
                                <span *ngIf="!creating">Create Room <i class="bi bi-arrow-right-circle ms-2"></i></span>
                                <span *ngIf="creating" class="spinner-border spinner-border-sm" role="status"
                                    aria-hidden="true"></span>
                            </button>
                            <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
