<div class="rules-overlay fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-75"
    (click)="closeRules.emit()">
    <div class="rules-content bg-gray-800 p-6 rounded-xl max-w-lg w-full shadow-2xl border border-gray-700 active-game-border"
        (click)="$event.stopPropagation()">
        <h2 class="text-2xl font-bold mb-4 text-amber-500">How to Play: Four in a Row</h2>
        <div class="space-y-4 text-gray-300">
            <p>Connect four of your markers in a row to win!</p>
        </div>
        <button (click)="closeRules.emit()"
            class="mt-6 w-full py-2 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-lg transition-colors">
            Got it!
        </button>
    </div>
</div>
