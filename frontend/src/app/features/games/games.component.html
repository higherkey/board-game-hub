<div class="container pb-4">
    <app-page-header title="All Games" subtitle="Browse our collection of available board games.">
    </app-page-header>

    <!-- Games Grid -->
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3 g-md-4">
        <div class="col" *ngFor="let game of games">
            <div class="card h-100 bg-surface shadow-sm hover-card d-flex flex-column text-center p-3"
                [class.border-accent]="game.status === 'Deployed'" [class.opacity-75]="game.status !== 'Deployed'">

                <div class="mb-3 display-6 text-primary" aria-hidden="true">{{game.icon}}</div>
                <h4 class="card-title text-primary mb-2">{{game.name}}</h4>
                <p class="card-text text-secondary small mb-4 flex-grow-1">{{game.description}}</p>

                <div class="mt-auto">
                    <button *ngIf="game.status === 'Deployed'" class="btn btn-primary w-100 py-2 fw-bold shadow-sm"
                        style="font-size: 0.8rem; letter-spacing: 0.02em;" [routerLink]="['/create-room']"
                        [queryParams]="{gameType: game.id}">
                        CREATE ROOM
                    </button>
                    <span *ngIf="game.status !== 'Deployed'" class="badge bg-secondary w-100 py-2">{{ game.status
                        }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
