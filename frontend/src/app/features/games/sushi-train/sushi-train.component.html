<div class="sushi-wrapper w-full h-full">
    <ng-container *ngIf="isHost; else playerView">
        <app-sushi-train-board [room]="room" [isHost]="isHost"></app-sushi-train-board>
    </ng-container>

    <ng-template #playerView>
        <app-sushi-train-player [gameState]="room.gameData" [currentUserId]="myConnectionId"></app-sushi-train-player>
    </ng-template>
</div>
