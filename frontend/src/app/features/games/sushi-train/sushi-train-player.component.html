<div class="h-full flex flex-col bg-orange-50 p-4">
    <!-- Header info -->
    <div class="bg-white p-2 rounded-lg shadow mb-4 flex justify-between items-center text-sm">
        <span class="font-bold text-orange-600">Round {{gameState?.round}}/3</span>
        <span class="font-bold">Score: {{myState?.totalScore || 0}}</span>
    </div>

    <!-- Wait State -->
    <div *ngIf="myState?.hasSelected"
        class="flex-1 flex flex-col items-center justify-center text-center animate-pulse">
        <div class="text-6xl mb-4">🍽️</div>
        <h2 class="text-2xl font-bold text-gray-700">Plate Selected!</h2>
        <p class="text-gray-500">Waiting for other diners...</p>
    </div>

    <!-- Draft View -->
    <div *ngIf="!myState?.hasSelected && myHand.length > 0" class="flex-1 flex flex-col">
        <h3 class="text-lg font-bold text-center mb-4 text-gray-700">Pick a dish to keep:</h3>

        <div class="flex-1 overflow-y-auto grid grid-cols-2 gap-4 pb-4">
            <button *ngFor="let card of myHand" (click)="selectCard(card.id)"
                class="bg-white p-3 rounded-xl shadow-md border-2 border-gray-100 hover:border-orange-500 active:scale-95 active:bg-orange-50 transition-all flex flex-col items-center justify-center min-h-[140px] relative">

                <div *ngIf="selectedId === card.id" class="absolute inset-0 bg-orange-500 opacity-20 rounded-xl"></div>

                <div class="text-5xl mb-2">{{getCardEmoji(card.type)}}</div>
                <div class="font-bold text-gray-800 text-sm">{{getCardName(card.type)}}</div>
                <div class="text-xs text-orange-600 font-semibold mt-1">{{getCardDesc(card.type)}}</div>
            </button>
        </div>
    </div>

    <!-- Round/Game End -->
    <div *ngIf="!myState?.hasSelected && myHand.length === 0" class="flex-1 flex flex-col items-center justify-center">
        <span *ngIf="gameState?.isGameOver" class="text-2xl font-bold text-red-600 animate-bounce">Game Over!</span>
        <span *ngIf="!gameState?.isGameOver" class="text-xl text-gray-600 animate-pulse">Passing plates...</span>
    </div>
</div>
