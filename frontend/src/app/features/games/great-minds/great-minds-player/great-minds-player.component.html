<div class="player-container" (touchmove)="onTouchMove($event)" (touchend)="onTouchEnd()" (touchcancel)="onTouchEnd()">

    <!-- HAND OF CARDS -->
    <div class="hand-area">
        <div class="card-hand">
            <div *ngFor="let card of myHand" class="player-card" [class.lowest]="card === lowestCard"
                [style.background]="getGradient(card)" [ngStyle]="getCardStyle(card)"
                (touchstart)="onTouchStart($event, card)">
                <span class="card-num">{{ card }}</span>
                <div class="swipe-hint" *ngIf="card === lowestCard && !isSwiping">SWIPE UP</div>
            </div>
        </div>

        <div class="empty-hand" *ngIf="myHand.length === 0">
            <span class="zen-text">CONCENTRATE</span>
        </div>
    </div>

    <!-- SYNC BTN -->
    <div class="footer-actions">
        <button class="sync-btn" (click)="useSync()" [disabled]="!canSync">
            ✨ SYNC ({{ gameState?.syncTokens || 0 }})
        </button>
    </div>
</div>
