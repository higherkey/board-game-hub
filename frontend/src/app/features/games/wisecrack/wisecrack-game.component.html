<div class="wisecrack-container w-full h-full flex flex-col relative">
    <!-- Rules Overlay -->
    <app-wisecrack-rules *ngIf="showRules" (dismiss)="showRules = false">
    </app-wisecrack-rules>

    <!-- Header / Status Bar -->
    <div class="p-2 bg-gray-800 text-white flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <span class="font-bold text-lg">Wisecrack</span>
            <button (click)="showRules = true"
                class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded border border-gray-600 transition-colors">
                Help/Rules
            </button>
        </div>
        <span class="text-sm">Round {{room.roundNumber}}</span>
    </div>

    <!-- Main Content Area -->
    <div class="flex-grow overflow-hidden relative">
        <!-- Board View (Shared Screen) -->
        <app-wisecrack-board *ngIf="isHost" [room]="room">
        </app-wisecrack-board>

        <!-- Player View (Controller) -->
        <app-wisecrack-player *ngIf="!isHost" [room]="room" [playerId]="playerId">
        </app-wisecrack-player>
    </div>
</div>
