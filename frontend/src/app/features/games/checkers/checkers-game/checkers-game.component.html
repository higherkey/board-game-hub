<div class="checkers-container w-full h-full flex flex-col relative overflow-hidden bg-gray-900 text-white">
    <!-- Rules Overlay -->
    <app-checkers-rules *ngIf="showRules" (closeRules)="showRules = false">
    </app-checkers-rules>

    <!-- Header -->
    <div class="p-2 bg-gray-800 flex justify-between items-center shrink-0 border-b border-gray-700">
        <div class="flex items-center gap-4">
            <span class="font-bold text-lg text-primary">CHECKERS</span>
            <button (click)="showRules = true"
                class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded border border-gray-600 transition-colors">
                Help/Rules
            </button>
        </div>
        <span class="text-sm opacity-75">Round {{room.roundNumber}}</span>
    </div>

    <!-- Main Content -->
    <div class="flex-grow overflow-hidden relative">
        <app-checkers-board *ngIf="isHost" [room]="room">
        </app-checkers-board>

        <app-checkers-player *ngIf="!isHost" [room]="room" [myConnectionId]="myConnectionId">
        </app-checkers-player>
    </div>
</div>
