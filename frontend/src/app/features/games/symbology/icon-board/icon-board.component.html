<div class="h-full flex flex-col bg-gray-900">
    <!-- Toolbar -->
    <div *ngIf="isInteractive"
        class="toolbar flex gap-3 p-3 bg-gray-800 border-b border-gray-700 justify-center shadow-lg z-20">
        <button *ngFor="let tool of tools" (click)="selectTool(tool.id)"
            [class.bg-indigo-600]="selectedTool === tool.id" [class.text-white]="selectedTool === tool.id"
            [class.bg-gray-700]="selectedTool !== tool.id" [class.text-gray-300]="selectedTool !== tool.id"
            class="flex items-center gap-2 px-5 py-2.5 rounded-lg transition-all font-semibold text-sm shadow-sm hover:translate-y-[-1px] active:translate-y-[1px]">
            <span class="material-icons text-lg" *ngIf="tool.id === 'Delete'">{{tool.icon}}</span>
            <span class="font-bold text-lg" *ngIf="tool.id !== 'Delete'">{{tool.icon}}</span>
            {{tool.label}}
        </button>
    </div>

    <!-- Board Grid -->
    <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
        <div
            class="grid grid-cols-4 xs:grid-cols-5 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-3 pb-20">
            <button type="button" *ngFor="let item of icons" (click)="onIconClick(item)"
                class="aspect-square relative flex items-center justify-center bg-gray-800 rounded-xl cursor-pointer hover:bg-gray-750 transition-all duration-200 group border border-gray-700/50 hover:border-indigo-500/50 hover:shadow-lg hover:shadow-indigo-500/10">

                <!-- Icon -->
                <span
                    class="text-3xl sm:text-4xl select-none filter drop-shadow-md group-hover:scale-110 transition-transform duration-200">{{item.icon}}</span>

                <!-- Markers Container -->
                <div class="absolute inset-0 p-1 flex flex-wrap content-start justify-end gap-1 pointer-events-none">
                    <button type="button" *ngFor="let m of getMarkersForIcon(item.icon)"
                        (click)="onMarkerClick($event, m)"
                        [class]="'w-6 h-6 rounded-full flex items-center justify-center shadow-lg border-2 border-gray-900 text-white text-xs font-bold pointer-events-auto cursor-pointer transform hover:scale-125 transition-transform ' + (m.markerType === 'Main' ? 'bg-green-500 hover:bg-green-400' : 'bg-red-500 hover:bg-red-400')"
                        [title]="m.markerType">
                        {{ m.markerType === 'Main' ? '?' : '!' }}
                    </button>
                </div>
            </button>
        </div>
    </div>
</div>
