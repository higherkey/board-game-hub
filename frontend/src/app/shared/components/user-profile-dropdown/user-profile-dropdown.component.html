<div class="dropdown" (click)="toggleDropdown($event)">
    <button class="d-flex align-items-center bg-transparent border-0 p-0 pointer profile-trigger gap-2" type="button"
        [attr.aria-expanded]="isDropdownOpen">

        <div class="avatar-container position-relative">
            <img *ngIf="session?.avatarUrl; else guestIcon" [src]="session?.avatarUrl" alt="Avatar"
                class="rounded-circle border border-2 border-accent shadow-sm" width="40" height="40">
            <ng-template #guestIcon>
                <div class="guest-avatar rounded-circle border border-2 border-accent d-flex align-items-center justify-content-center bg-dark shadow-sm"
                    style="width: 40px; height: 40px;">
                    <i class="bi bi-person-fill text-accent fs-5"></i>
                </div>
            </ng-template>
            <i class="bi bi-chevron-down position-absolute"
                style="bottom: -2px; right: -4px; font-size: 0.7rem; background: var(--bg-surface); border-radius: 50%; padding: 1px; color: var(--text-secondary);"></i>
        </div>

        <div class="d-flex flex-column align-items-start line-height-1 d-none d-sm-flex">
            <span class="user-name-text fw-bold" style="font-size: 0.9rem;">{{ session?.name }}</span>
            <span *ngIf="session?.isGuest" class="badge rounded-pill bg-secondary text-white"
                style="font-size: 0.65rem; padding: 0.2rem 0.5rem;">Guest</span>
        </div>
    </button>

    <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary shadow mt-2" [class.show]="isDropdownOpen">
        <li class="px-3 py-2 border-bottom border-secondary mb-1">
            <div class="small text-muted text-uppercase fw-bold" style="font-size: 0.65rem;">Account</div>
            <div class="text-white fw-bold truncate" style="max-width: 150px;">{{ session?.name }}</div>
        </li>
        <li *ngIf="!session?.isGuest"><a class="dropdown-item text-white" routerLink="/profile"><i
                    class="bi bi-person me-2"></i>My Profile</a></li>
        <li><a class="dropdown-item text-white" routerLink="/history"><i class="bi bi-clock-history me-2"></i>Game
                History</a></li>
        <li><a class="dropdown-item text-white" routerLink="/settings"><i class="bi bi-gear me-2"></i>Settings</a></li>
        <li>
            <hr class="dropdown-divider border-secondary">
        </li>
        <li><button class="dropdown-item text-danger" (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i>{{ session?.isGuest ? 'Leave Session' : 'Sign Out' }}
            </button></li>
    </ul>
</div>
